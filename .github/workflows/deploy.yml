name: Run Tests

# Runs on every push to main AND on every pull request
# Railway handles deployment automatically via its GitHub integration
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///test.db
      DISCORD_CLIENT_ID: test-client-id
      DISCORD_CLIENT_SECRET: test-client-secret
      DISCORD_REDIRECT_URI: http://localhost/oauth-callback

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest --quiet

      - name: Run API ingest tests
        run: python -m pytest test_api_ingest.py -v --tb=short

      - name: Run bot unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Summary
        if: always()
        run: |
          echo "================================"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  By     : ${{ github.actor }}"
          echo "  Result : ${{ job.status }}"
          echo "================================"
